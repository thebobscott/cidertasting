<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hard Cider Tasting Scorecard</title>
</head>
<body>
  <div id="root"></div>

  <!-- React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fetch and transpile cider-scorecard.jsx -->
  <script type="text/babel">
    (async () => {
      try {
        // Fetch the JSX file
        const response = await fetch('./cider-scorecard.jsx');
        const jsxCode = await response.text();
        
        // Create a blob URL for dynamic evaluation
        const transformedCode = Babel.transform(jsxCode, {
          presets: ['react'],
          filename: 'cider-scorecard.jsx'
        }).code;
        
        // Create a module-like scope
        const moduleScope = {
          module: { exports: {} },
          require: (name) => {
            if (name === 'react') return React;
            if (name === 'react-dom') return ReactDOM;
            throw new Error(`Cannot find module '${name}'`);
          }
        };
        
        // Execute the transformed code
        const fn = new Function('module', 'React', 'ReactDOM', transformedCode);
        fn(moduleScope.module, React, ReactDOM);
        
        // Get the default export
        const App = moduleScope.module.exports.default;
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (error) {
        console.error('Failed to load app:', error);
        document.getElementById('root').innerHTML = `<div style="padding: 2rem; color: red; font-family: monospace;"><h2>Error Loading App</h2><pre>${error.message}</pre></div>`;
      }
    })();
  </script>
</body>
</html>
